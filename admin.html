<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel - Complaint Management System</title>
  <link rel="stylesheet" href="admin.css" />
  <script src="admin.js" defer></script>
</head>
<body>
  <main class="admin-shell">
    <header class="admin-header">
      <div>
        <p class="eyebrow">Admin Panel</p>
        <h1>Complaint Management Dashboard</h1>
      </div>
      <p class="admin-user" id="adminUser">Welcome, Admin</p>
    </header>

    <section class="stats-grid">
      <article class="stat-card">
        <h3>Total Complaints</h3>
        <p id="totalComplaints">0</p>
      </article>
      <article class="stat-card">
        <h3>Pending Complaints</h3>
        <p id="pendingComplaints">0</p>
      </article>
      <article class="stat-card">
        <h3>Resolved Complaints</h3>
        <p id="resolvedComplaints">0</p>
      </article>
      <article class="stat-card">
        <h3>Active Users</h3>
        <p id="activeUsers">0</p>
      </article>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>All Complaints</h2>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Subject</th>
              <th>Priority</th>
              <th>Status</th>
              <th>Assigned To</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="complaintsTable"></tbody>
        </table>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Manage Users</h2>
      </div>

      <form id="userForm" class="user-form">
        <input type="text" id="newUserName" placeholder="Enter staff name" required />
        <button type="submit" class="btn">Add User</button>
      </form>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>User Name</th>
              <th>Role</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="usersTable"></tbody>
        </table>
      </div>
    </section>
  </main>
</body>
</html>
